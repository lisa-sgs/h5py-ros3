variables:
  HDF5_VERSION: "2.0.0"

build-deps-image:
  image: docker:latest
  parallel:
    matrix:
      - OS_IMAGE: ["debian:latest"]
        OS_TAG_SLUG: ["debian-latest"]
  variables:
    TAG: "$CI_REGISTRY_IMAGE/deps:$OS_TAG_SLUG"
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker pull $TAG || true
    - echo "Building base image for $OS_IMAGE..."
    - docker build
      --cache-from $TAG
      --build-arg BASE_IMAGE=$OS_IMAGE
      --build-arg HDF5_VERSION=$HDF5_VERSION
      -f Dockerfile
      -t $TAG .
    - docker push $TAG
  rules:
    - changes:
        - Dockerfile
        - .gitlab-ci.yml

build-wheels:
  needs:
    - build-deps-image
  image: "$CI_REGISTRY_IMAGE/deps:$OS_TAG_SLUG"
  parallel:
    matrix:
      - OS_TAG_SLUG: ["debian-latest"]
        PYTHON_VERSION: ["3.10", "3.11", "3.12", "3.13"]
  script:
    - echo "Building for Python $PYTHON_VERSION on $OS_TAG_SLUG"

    - uv venv --python $PYTHON_VERSION .venv
    - source .venv/bin/activate

    - pip download --no-binary h5py h5py
    - tar xzf h5py-*.tar.gz
    - cd h5py-*/

    - echo "Building wheel..."
    - uv build --wheel

    - echo "Bundling dependencies..."
    - uvx --from auditwheel auditwheel repair dist/*.whl --plat linux_x86_64

    - pip install wheelhouse/*.whl
    - python -c "import h5py; print(f'h5py version {h5py.__version__} loaded with HDF5 {h5py.version.hdf5_version}');"

    - mkdir -p ../artifacts
    - mv wheelhouse/*.whl ../artifacts/

  artifacts:
    paths:
      - artifacts/
    expire_in: 1 day
